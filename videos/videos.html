<html>

<head>
    <title>Exp Store</title>
    <link rel="icon" type="image/png" href="exp.png">
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Playwrite+NZ+Basic:wght@100..400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'nunito', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg,
                    #020617,
                    #0f172a,
                    #1e3a8a);
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;

            background: url("stars.png") center/cover no-repeat;

            opacity: 0.5;

            z-index: -1;
            /* Important */
            pointer-events: none;
        }

        .topbar {
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .topbar h2 {
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            background-color: red;
        }

        .topbar .videos-head {
            background-color: #1e3a8a;
        }


        .content {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            margin: 20px;
        }


        .videos {
            display: flex;
            align-items: center;
            flex-direction: column;
            justify-content: center;
        }


        .videos img {
            width: 300px;
            height: 190px;
            border-radius: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.491)
        }

        .videos p {
            color: #fff;
            font-size: 14px;
            margin-top: 5px;
            width: 80%;
            text-align: center;
            background-color: #184895;
            padding: 5px 10px;
            border-radius: 10px;
        }




        /* LOADER OVERLAY */



        .loader-overlay {
            position: fixed;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg,
                    #020617,
                    #0f172a,
                    #1e3a8a);
            visibility: visible;
            z-index: 9999;
            transition: opacity .5s ease;
        }

        .loader-overlay.hide {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .loader {
            display: flex;
            gap: 15px;
        }

        .loader span {
            font-size: 60px;
            font-weight: 800;
            color: #fff;

            animation: bounce 1s infinite;
        }

        .loader span:nth-child(2) {
            animation-delay: .2s;
        }

        .loader span:nth-child(3) {
            animation-delay: .4s;
        }


        .loader span:nth-child(1) {
            color: #ff3131;
            text-shadow: 0 0 20px #ff3131;
        }

        .loader span:nth-child(2) {
            color: #ff8c00;
            text-shadow: 0 0 20px #ff8c00;
        }

        .loader span:nth-child(3) {
            color: #3b82f6;
            text-shadow: 0 0 20px #3b82f6;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
                color: #fff;
            }

            50% {
                transform: translateY(-20px);
                color: #3b82f6;
                text-shadow: 0 0 20px #3b82f6;
            }
        }


        @media(max-width:500px) {
            .content {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 50px;
            }

            .content img {
                width: 250px;
                height: 150px;
            }


        }
    </style>
</head>

<body>

    <div class="loader-overlay">
        <div class="loader">
            <span>E</span>
            <span>X</span>
            <span>P</span>
        </div>
    </div>



    <div class="topbar">
        <h2>YouTube</h2>
        <h2 class="videos-head">Videos</h2>
    </div>

    <div class="content">

        <div class="video-1 videos" data-url="https://youtu.be/-4P5N4J5RWs?si=IkYgbA1ohdIrd_P0">
            <img src="1.png" alt="">
            <p>Start Web Development from Scratch Today</p>
        </div>

        <div class="video-2 videos" data-url="https://youtu.be/z3Br-ytyMSw?si=tx0Z3NjqUOoyTDBk">
            <img src="2.png" alt="">
            <p>What's inside a Keyboard</p>
        </div>

        <div class="video-3 videos" data-url="https://youtu.be/QHO16s0LO-M?si=XtyT7lNRAuEazbxo">
            <img src="3.png" alt="">
            <p>I have built an Laptop stand from scratch</p>
        </div>

        <div class="video-4 videos" data-url="https://youtu.be/iiqR0k0gGXg?si=XOU8hTHO-D-Hmskl">
            <img src="4.png" alt="">
            <p>Web Builder Series #1</p>
        </div>

        <div class="video-5 videos" data-url="https://youtu.be/n4NWbveArbQ?si=LB3wePO7tViyovR4">
            <img src="5.png" alt="">
            <p>Web Builder Series #2</p>
        </div>

        <div class="video-6 videos" data-url="https://youtu.be/UaB-UQdbqBc?si=4EN_vSiz1KcmHHoS">
            <img src="6.jpg" alt="">
            <p>Let's Build a Buds Case</p>
        </div>

        <div class="video-7 videos" data-url="https://youtu.be/CVG-mzezNlk?si=0yNf3t3FAqTraYqT">
            <img src="7.png" alt="">
            <p>Web Builder Series #3</p>
        </div>

        <div class="video-8 videos" data-url="https://youtu.be/1enyo0zQBPE?si=6F8uGDFRRUBg3MaC">
            <img src="8.png" alt="">
            <p>Web Builder Series #4</p>
        </div>
        
        <div class="video-9 videos" data-url="https://youtu.be/tWhA_-04OMY?si=j6p3Lkn6gey8BFCJ">
            <img src="9.png" alt="">
            <p>Web Builder Series #5 Final Video</p>
        </div>


    </div>

</body>


<script>

    const loader =
        document.querySelector(".loader-overlay");

    // Hide loader after page load
    window.addEventListener("load", () => {

        setTimeout(() => {

            loader.classList.add("hide");

        }, 500);

    });

    // Show loader before navigation
    document.querySelectorAll(".page-link")
        .forEach(item => {

            item.addEventListener("click", () => {

                const url =
                    item.dataset.url;

                loader.classList.remove("hide");

                setTimeout(() => {

                    window.location.href = url;

                }, 500);

            });

        });

    // Fix browser back button
    window.addEventListener("pageshow", () => {

        loader.classList.add("hide");

    });



    document.querySelectorAll(".videos").forEach(video => {

        video.addEventListener("click", () => {

            const url = video.dataset.url;

            if (url) {
                window.open(url, "_blank");
            }

        });

    });

</script>

</html>
