<html>

<head>
    <title>YouTube</title>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Playwrite+NZ+Basic:wght@100..400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'nunito', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg,
                    #020617,
                    #0f172a,
                    #1e3a8a);
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;

            background: url("stars.png") center/cover no-repeat;

            opacity: 0.5;

            z-index: -1;
            /* Important */
            pointer-events: none;
        }

        .topbar {
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .topbar h2 {
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            background-color: red;
        }

        .content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 150px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .content div {
            width: 350px;
            height: 230px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background-color: #fff;
            cursor: pointer;
        }


        .videos {
            background-image: url('videos.png');
            background-size: cover;
            border: 1.5px solid rgba(255, 255, 255, 0.491);
        }

        .shorts {
            background-image: url('shorts.png');
            background-size: cover;
            border: 1.5px solid rgba(255, 255, 255, 0.491);
        }


        .category-head {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
        }

        .category-head h2 {
            background-color: #1e3a8a;
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
        }

        .categories {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .categories div {
            width: 250px;
            height: 160px;
            border-radius: 20px;
            display: flex;
            align-items: end;
            justify-content: center;
            color: #fff;
            cursor: pointer;
        }



        .series {
            background-image: url('web builder.png');
            background-size: cover;
            border: 1.5px solid rgba(255, 255, 255, 0.491);
        }

        .series p {
            background-color: #0145ff;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            padding: 8px 12px;
            font-size: 14px;
            width: 150px;
            text-align: center;
        }

        .diy {
            background-image: url('diy.png');
            background-size: cover;
            border: 1.5px solid rgba(255, 255, 255, 0.491);
        }

        .diy p {
            background-color: #ffaf01;
            border-top-left-radius: 10px;
            color: black;
            border-top-right-radius: 10px;
            padding: 8px 12px;
            font-size: 14px;
            width: 150px;
            text-align: center;
        }

        .teardown {
            background-image: url('teardown.png');
            background-size: cover;
            border: 1.5px solid rgba(255, 255, 255, 0.491);
        }


        .teardown p {
            background-color: #9101ff;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            padding: 8px 12px;
            width: 150px;
            text-align: center;
            font-size: 14px;
        }


        .webdev {
            background-image: url('webdev.png');
            background-size: cover;
            border: 1.5px solid rgba(255, 255, 255, 0.491);
        }


        .webdev p {
            background-color: #01c8ff;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            padding: 8px 12px;
            width: 150px;
            text-align: center;
            font-size: 14px;
        }



/* LOADER OVERLAY */



        .loader-overlay {
            position: fixed;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg,
                    #020617,
                    #0f172a,
                    #1e3a8a);
            visibility: visible;
            z-index: 9999;
            transition: opacity .5s ease;
        }

        .loader-overlay.hide {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .loader {
            display: flex;
            gap: 15px;
        }

        .loader span {
            font-size: 60px;
            font-weight: 800;
            color: #fff;

            animation: bounce 1s infinite;
        }

        .loader span:nth-child(2) {
            animation-delay: .2s;
        }

        .loader span:nth-child(3) {
            animation-delay: .4s;
        }


        .loader span:nth-child(1) {
            color: #ff3131;
            text-shadow: 0 0 20px #ff3131;
        }

        .loader span:nth-child(2) {
            color: #ff8c00;
            text-shadow: 0 0 20px #ff8c00;
        }

        .loader span:nth-child(3) {
            color: #3b82f6;
            text-shadow: 0 0 20px #3b82f6;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
                color: #fff;
            }

            50% {
                transform: translateY(-20px);
                color: #3b82f6;
                text-shadow: 0 0 20px #3b82f6;
            }
        }


        @media(max-width:500px) {
            .content {
                gap: 30px;
            }

            .content div {
                width: 280px;
                height: 190px;
            }
        }
    </style>
</head>

<body>

    <div class="loader-overlay">
        <div class="loader">
            <span>E</span>
            <span>X</span>
            <span>P</span>
        </div>
    </div>



    <div class="topbar">
        <h2>YouTube</h2>
    </div>

    <div class="content">

        <div class="videos page-link" data-url="videos/videos.html">

        </div>

        <div class="shorts page-link" data-url="shorts/shorts.html">

        </div>

    </div>

    <div class="category-head">
        <h2>Categories</h2>
    </div>

    <div class="categories">

        <div class="series page-link" data-url="videos.html">
            <p>Web Builder Series</p>
        </div>

        <div class="diy page-link" data-url="videos.html">
            <p>DIY</p>
        </div>

        <div class="teardown page-link" data-url="videos.html">
            <p>Teardown</p>
        </div>

        <div class="webdev page-link" data-url="videos.html">
            <p>Web Development</p>
        </div>

    </div>
</body>


<script>

    const loader =
        document.querySelector(".loader-overlay");

    // Hide loader after page load
    window.addEventListener("load", () => {

        setTimeout(() => {

            loader.classList.add("hide");

        }, 500);

    });

    // Show loader before navigation
    document.querySelectorAll(".page-link")
        .forEach(item => {

            item.addEventListener("click", () => {

                const url =
                    item.dataset.url;

                loader.classList.remove("hide");

                setTimeout(() => {

                    window.location.href = url;

                }, 500);

            });

        });

    // Fix browser back button
    window.addEventListener("pageshow", () => {

        loader.classList.add("hide");

    });

</script>

</html>
