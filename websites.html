<html>

<head>
    <title>YouTube</title>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Playwrite+NZ+Basic:wght@100..400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'nunito', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg,
                    #020617,
                    #0f172a,
                    #1e3a8a);
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;

            background: url("stars.png") center/cover no-repeat;

            opacity: 0.5;

            z-index: -1;
            /* Important */
            pointer-events: none;
        }

        .topbar {
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .topbar h2 {
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            background-color: #00a2ff;
        }

        .content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 150px;
            margin-top: 20px;
        }

        .content .card-website {
            width: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 20px;
        }

        .content .buttons {
            width: 100%;
            align-items: center;
            margin-top: 10px;
            justify-content: space-around;
            display: flex;
        }

        .content .name {
            color: #1e293b;
            padding: 10px 15px;
            border-radius: 10px;
            /* margin-bottom: 15px; */
            background-color: antiquewhite;
        }

        .content img {
            width: 100%;
            cursor: pointer;
            border: 1.5px solid rgba(255, 255, 255, 0.491);
            border-radius: 20px;
        }

        .content button {
            background-color: #7b00ff;
            color: #fff;
            padding: 13px 20px;
            cursor: pointer;
            border-radius: 10px;
            border: 0;
            outline: 0;
        }

        .content a {
            text-decoration: none;
            color: #fff;
            background-color: #2563eb;
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* CODE POPUP */

        .code-popup {
            position: fixed;
            inset: 0;
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;

            background: rgba(0, 0, 0, .5);
            backdrop-filter: blur(10px);
            visibility: hidden;
            z-index: 1000;
            transition: .5s;
        }

        .code-popup.active {
            opacity: 1;
            visibility: visible;
        }

        .code-box {
            width: 90%;
            max-width: 1000px;
            height: 80vh;

            background: #0f172a;

            border: 1px solid rgba(255, 255, 255, .1);

            border-radius: 20px;

            display: flex;
            flex-direction: column;

            overflow: hidden;
        }


        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 15px 20px;

            border-bottom: 1px solid rgba(255, 255, 255, .1);
        }

        .tabs {
            display: flex;
            gap: 10px;
        }

        .tab {
            border: none;
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: .3s;
        }

        .tab.active {
            background: #2563eb;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .copy-code,
        .close-code {
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 10px;
            padding: 5px 10px;
            transition: .3s;
        }

        .copy-code {
            background: #2563eb;
        }

        .close-code {
            font-size: 20px;
            background: #ef4444;
        }

        .copy-code:hover,
        .close-code:hover {
            transform: translateY(-2px);
        }

        .code-view {
            flex: 1;

            overflow: auto;

            padding: 20px;
        }

        .code-view pre {
            margin: 0;

            white-space: pre-wrap;

            color: #fff;

            line-height: 1.7;
        }

        .code-view::-webkit-scrollbar {
            display: none;
        }

        .code-view {
            scrollbar-width: none;
        }

        .code-box pre {
            color: white;
            overflow: auto;
            height: 100%;
        }


        .no-code {
            display: block;
            text-align: center;
            margin-top: 50px;
            color: #94a3b8;
            font-size: 18px;
            font-style: italic;
        }



        /* LOADER */

        .loader-overlay {
            position: fixed;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg,
                    #020617,
                    #0f172a,
                    #1e3a8a);
            visibility: visible;
            z-index: 9999;
            transition: opacity .5s ease;
        }

        .loader-overlay.hide {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .loader {
            display: flex;
            gap: 15px;
        }

        .loader span {
            font-size: 60px;
            font-weight: 800;
            color: #fff;

            animation: bounce 1s infinite;
        }

        .loader span:nth-child(2) {
            animation-delay: .2s;
        }

        .loader span:nth-child(3) {
            animation-delay: .4s;
        }


        .loader span:nth-child(1) {
            color: #ff3131;
            text-shadow: 0 0 20px #ff3131;
        }

        .loader span:nth-child(2) {
            color: #ff8c00;
            text-shadow: 0 0 20px #ff8c00;
        }

        .loader span:nth-child(3) {
            color: #3b82f6;
            text-shadow: 0 0 20px #3b82f6;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
                color: #fff;
            }

            50% {
                transform: translateY(-20px);
                color: #3b82f6;
                text-shadow: 0 0 20px #3b82f6;
            }
        }

        @media(max-width:500px) {

            .content{
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;

            }

            .content img{
                width:300px;
            }

            .content .buttons{
                width:300px;
            }

            .content .name{
                font-size: 14px;
                padding:10px;
            }

            .content button{
                font-size: 14px;
                padding: 10px;
            }

            .content a{
                font-size: 14px;
                padding: 10px;
            }

            .copy-code{
                padding:5px;
            }

            .close-code{
                padding:5px;
            }

            .tab{
                padding:8px 10px;
            }

        }
    </style>
</head>

<body>

    <div class="loader-overlay">
        <div class="loader">
            <span>E</span>
            <span>X</span>
            <span>P</span>
        </div>
    </div>



    <div class="code-popup">

        <div class="code-box">

            <div class="code-header">

                <div class="tabs">
                    <button class="tab active" onclick="loadCode('source-codes/card-html.txt',this)">
                        HTML
                    </button>

                    <button class="tab" onclick="loadCode('source-codes/card-css.txt',this)">
                        CSS
                    </button>

                    <button class="tab" onclick="loadCode('source-codes/card-js.txt',this)">
                        JS
                    </button>
                </div>

                <div class="actions">
                    <button class="copy-code">
                        <i class="ri-file-copy-line"></i>
                        Copy
                    </button>

                    <button class="close-code">
                        <i class="ri-close-line"></i>
                    </button>
                </div>

            </div>

            <div class="code-view">
                <pre><code id="sourceCode"></code></pre>
            </div>

        </div>

    </div>



    <div class="topbar">
        <h2>Websites</h2>
    </div>

    <div class="content">

        <div class="card-website">

            <img src="website-1.png" alt="CARD wEBSITE" onclick="window.location.href='card website/card.html'">

            <div class="buttons">

                <div class="name">
                    <p>Card Website</p>
                </div>


                <div class="code">
                    <button onclick="event.stopPropagation(); openSourceCode();">Source code</button>
                </div>

                <div class="link">
                    <a href="https://youtu.be/iiqR0k0gGXg?si=OGhQ1OfwcPPpEKE8">Videos</a>
                </div>
            </div>

        </div>



    </div>



    </div>
</body>

<script>
    const codeDisplay = document.getElementById("sourceCode");

    function loadCode(file, button) {

        document
            .querySelectorAll(".tab")
            .forEach(tab => tab.classList.remove("active"));

        if (button) {
            button.classList.add("active");
        }

        fetch(file)

            .then(response => {

                if (!response.ok) {
                    throw new Error("No File");
                }

                return response.text();

            })

            .then(code => {

                sourceCode.textContent = code;

            })

            .catch(() => {

                let fileType = "File";

                if (file.includes("html")) {
                    fileType = "HTML";
                }
                else if (file.includes("css")) {
                    fileType = "CSS";
                }
                else if (file.includes("js")) {
                    fileType = "JavaScript";
                }

                sourceCode.textContent =
                    `This website does not have a ${fileType} file.`;

            });

    }


    const copyBtn =
        document.querySelector(".copy-code");

    copyBtn.addEventListener("click", () => {

        navigator.clipboard.writeText(
            sourceCode.textContent
        );

        copyBtn.innerHTML =
            '<i class="ri-check-line"></i> Copied';

        copyBtn.style.background =
            "#16a34a";

        setTimeout(() => {

            copyBtn.innerHTML =
                '<i class="ri-file-copy-line"></i> Copy';

            copyBtn.style.background =
                "#2563eb";

        }, 2000);

    });

    function openSourceCode() {

        document
            .querySelector(".code-popup")
            .classList.add("active");

        loadCode(
            "source-codes/card-html.txt",
            document.querySelector(".tab")
        );
    }

    document.querySelector(".close-code")
        .addEventListener("click", () => {

            document.querySelector(".code-popup")
                .classList.remove("active");

        });


    document.querySelector(".copy-code")
        .addEventListener("click", () => {

            navigator.clipboard.writeText(
                document.getElementById("sourceCode").textContent
            );

        });





    const loader =
        document.querySelector(".loader-overlay");

    // Hide loader after page load
    window.addEventListener("load", () => {

        setTimeout(() => {

            loader.classList.add("hide");

        }, 500);

    });

    // Show loader before navigation
    document.querySelectorAll(".page-link")
        .forEach(item => {

            item.addEventListener("click", () => {

                const url =
                    item.dataset.url;

                loader.classList.remove("hide");

                setTimeout(() => {

                    window.location.href = url;

                }, 500);

            });

        });

    // Fix browser back button
    window.addEventListener("pageshow", () => {

        loader.classList.add("hide");

    });
</script>

</html>
